name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest (unit only)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: uv run pytest

      # Regenerate the JSON Schema bundle from Pydantic and fail if the
      # committed file drifted from what the models would emit. Keeps the
      # single source of truth (Pydantic) and the wire artifact in sync.
      - name: Verify generated JSON Schema is up to date
        run: |
          uv run python shared/scripts/export_json_schema.py
          git diff --exit-code web/src/types/generated/schemas.json

  web:
    name: Web — lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm typecheck

      - name: Test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm test
